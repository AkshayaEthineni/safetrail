version: '3.9'

services:
  app:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - '5000:5000'
    env_file: .env
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://mongo:27017/smarttouristsafety
      - JWT_SECRET=${JWT_SECRET}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
    depends_on:
      - mongo

  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - '27017:27017'
    volumes:
      - mongo-data:/data/db

volumes:
  mongo-data:
