<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SafeTrail Emergency Response Center</title>

    <link rel="stylesheet" href="./css/emergency.css">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>

    <link rel="stylesheet"
        href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar">

        <div class="logo-section">
            <div class="logo-box">
                <i class="fa-solid fa-shield-heart"></i>
            </div>

            <div>
                <h2>SafeTrail</h2>
                <span>Emergency Response Center</span>
            </div>
        </div>

        <div class="nav-title">
            Emergency
        </div>

        <div class="nav-actions">

            <div class="status-pill">
                <span class="live-dot"></span>
                System Online
            </div>

            <div class="operator-card">
                <i class="fa-solid fa-user-shield"></i>
                <div>
                    <h4 id="userName">Operator</h4>
                    <span>Control Desk</span>
                </div>
            </div>

            <button class="logout-btn" id="logoutBtn">
                <i class="fa-solid fa-right-from-bracket"></i>
            </button>

        </div>

    </nav>

    <!-- Floating SOS Monitor -->
    <div class="sos-monitor">
        <div class="pulse"></div>
        <i class="fa-solid fa-bell"></i>
        <span>LIVE SOS</span>
    </div>

    <!-- Toast Container -->
    <div id="toastContainer"></div>

    <!-- Main -->
    <main class="main-layout">

        <aside class="incident-panel">

            <!-- Stats -->
            <div class="stats-grid">

                <div class="stat-card">
                    <span>Active</span>
                    <h2 id="activeCount">0</h2>
                </div>

                <div class="stat-card">
                    <span>Responding</span>
                    <h2 id="respondingCount">0</h2>
                </div>

                <div class="stat-card">
                    <span>Resolved</span>
                    <h2 id="resolvedCount">0</h2>
                </div>

            </div>

            <div class="section-header">
                <h3>Live Incident Feed</h3>
            </div>

            <div id="incidentList" class="incident-list"></div>

        </aside>

        <section class="map-panel">
            <div class="section-header map-title">
                <h3>Incident Map</h3>
                <span>Incidents, hospitals, and police stations</span>
            </div>

            <div class="map-wrapper">
                <div id="emergencyMap"></div>
            </div>
        </section>

        <aside class="response-console">
            <div class="section-header">
                <h3>Response Console</h3>
            </div>

            <div class="console-card">
                <div class="console-item">
                    <label>Tourist</label>
                    <span id="touristName">Select Incident</span>
                </div>

                <div class="console-item">
                    <label>Contact</label>
                    <span id="touristContact">-</span>
                </div>

                <div class="console-item">
                    <label>Emergency Contact</label>
                    <span id="emergencyContact">-</span>
                </div>

                <div class="console-item">
                    <label>Type</label>
                    <span id="incidentType">-</span>
                </div>

                <div class="console-item">
                    <label>Status</label>
                    <span id="incidentStatus">-</span>
                </div>

                <div class="console-item">
                    <label>Location</label>
                    <span id="incidentLocation">-</span>
                </div>

                <div class="console-actions">
                    <button class="respond-btn" id="consoleRespondBtn" type="button" disabled>Respond</button>
                    <button class="resolve-btn" id="consoleResolveBtn" type="button" disabled>Resolve</button>
                </div>

            </div>

        </aside>

    </main>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="/socket.io/socket.io.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/map.js"></script>
    <script src="js/sos.js"></script>
    <script src="js/emergency.js"></script>

</body>
</html>
